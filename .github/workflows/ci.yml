name: CI

on:
  push:
    branches: [main, staging]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: fmt · clippy · build · test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Matches the pinned channel in ./rust-toolchain.toml (1.94.1, which
      # stellar-rpc-client 26 requires). Components mirror that file.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets --locked

      # Characterization / golden suite. INSTA_UPDATE is left unset so insta
      # compares against the committed snapshots and fails on any drift.
      - name: Test
        run: cargo test --workspace --locked
